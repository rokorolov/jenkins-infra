---
-   name: Create nginx config directory
    become: true
    ansible.builtin.file:
        path: /etc/jenkins/nginx
        state: directory
        owner: root
        group: root
        mode: '0755'

-   name: Deploy nginx config
    become: true
    ansible.builtin.template:
        src: nginx.conf.j2
        dest: /etc/jenkins/nginx/jenkins.conf
        owner: root
        group: root
        mode: '0644'
