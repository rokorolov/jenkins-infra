---
-   name: Install and configure Docker
    become: true
    block:
        -   name: Install dependencies
            ansible.builtin.apt:
                name:
                    - apt-transport-https
                    - ca-certificates
                    - curl
                    - software-properties-common
                state: present
                update_cache: yes

        -   name: Create keyrings directory
            ansible.builtin.file:
                path: /etc/apt/keyrings
                state: directory
                mode: '0755'

        -   name: Add Docker GPG key
            ansible.builtin.get_url:
                url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
                dest: /etc/apt/keyrings/docker.asc
                mode: '0644'
                force: true

        -   name: Add Docker APT repository
            ansible.builtin.apt_repository:
                repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
                state: present
                filename: docker
                update_cache: yes

        -   name: Install Docker Engine and Compose plugin
            ansible.builtin.apt:
                name:
                    - docker-ce
                    - docker-ce-cli
                    - containerd.io
                    - docker-buildx-plugin
                    - docker-compose-plugin
                state: present
            notify: Ensure docker service is started and enabled

-   name: Set periodic Docker prune
    become: true
    ansible.builtin.cron:
        name: docker-prune
        job: 'docker system prune -af --filter until=72h'
        minute: '0'
        hour: '1'

-   name: Remove useless packages and dependencies
    become: true
    ansible.builtin.apt:
        autoclean: yes
        autoremove: yes
